<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CryptoPulse — Live Crypto Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0b14;
    --card: rgba(255, 255, 255, 0.04);
    --border: rgba(255, 255, 255, 0.08);
    --text: #e8eaf2;
    --muted: #8b8fa3;
    --green: #16c784;
    --red: #ea3943;
    --accent: #6c5ce7;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Inter", system-ui, sans-serif;
    background: radial-gradient(1200px 600px at 70% -10%, rgba(108,92,231,0.25), transparent),
                radial-gradient(900px 500px at 0% 100%, rgba(22,199,132,0.12), transparent), var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 20px 64px;
  }
  header { max-width: 1100px; margin: 0 auto 32px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
  .brand { display: flex; align-items: center; gap: 12px; font-weight: 800; font-size: 22px; letter-spacing: -0.5px; }
  .logo { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, var(--accent), var(--green)); display: grid; place-items: center; font-size: 20px; box-shadow: 0 6px 24px rgba(108,92,231,0.4); }
  .pill { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 8px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 10px var(--green); animation: pulse 1.6s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  .controls { max-width: 1100px; margin: 0 auto 20px; display: flex; gap: 10px; flex-wrap: wrap; }
  input {
    flex: 1; min-width: 200px; padding: 12px 16px; border-radius: 12px;
    border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 15px; outline: none;
  }
  input:focus { border-color: var(--accent); }
  .grid { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 16px; }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 20px;
    backdrop-filter: blur(12px); transition: transform 0.2s, border-color 0.2s;
  }
  .card:hover { transform: translateY(-4px); border-color: rgba(108,92,231,0.5); }
  .coin-head { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .coin-head img { width: 36px; height: 36px; border-radius: 50%; }
  .coin-name { font-weight: 700; font-size: 16px; }
  .coin-sym { color: var(--muted); font-size: 12px; text-transform: uppercase; }
  .price { font-size: 26px; font-weight: 800; letter-spacing: -1px; }
  .change { display: inline-flex; align-items: center; gap: 4px; font-weight: 600; font-size: 14px; margin-top: 6px; padding: 4px 10px; border-radius: 999px; }
  .up { color: var(--green); background: rgba(22,199,132,0.12); }
  .down { color: var(--red); background: rgba(234,57,67,0.12); }
  .meta { margin-top: 14px; font-size: 12px; color: var(--muted); display: flex; justify-content: space-between; }
  .skeleton { height: 150px; border-radius: 18px; background: linear-gradient(90deg, rgba(255,255,255,0.03), rgba(255,255,255,0.08), rgba(255,255,255,0.03)); background-size: 200% 100%; animation: shimmer 1.4s infinite; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  footer { max-width: 1100px; margin: 40px auto 0; text-align: center; color: var(--muted); font-size: 13px; }
  footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
  <header>
    <div class="brand"><div class="logo">📈</div> CryptoPulse</div>
    <div class="pill"><span class="dot"></span> Live · auto-refresh 60s</div>
  </header>

  <div class="controls">
    <input id="search" placeholder="Filter coins… (e.g. bitcoin, sol)" />
  </div>

  <div class="grid" id="grid">
    <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
    <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
  </div>

  <footer>
    Data from <a href="https://www.coingecko.com" target="_blank" rel="noopener">CoinGecko</a> · Built by
    <a href="https://xonix-am14.netlify.app" target="_blank" rel="noopener">xonix</a> ·
    <a href="https://github.com/xonix97" target="_blank" rel="noopener">GitHub</a>
  </footer>

<script>
  const API = "https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=24&page=1&sparkline=false&price_change_percentage=24h";
  let coins = [];

  const fmt = (n) => n >= 1
    ? "$" + n.toLocaleString("en-US", { maximumFractionDigits: 2 })
    : "$" + n.toLocaleString("en-US", { maximumFractionDigits: 6 });
  const fmtCap = (n) => {
    if (n >= 1e12) return "$" + (n / 1e12).toFixed(2) + "T";
    if (n >= 1e9) return "$" + (n / 1e9).toFixed(2) + "B";
    if (n >= 1e6) return "$" + (n / 1e6).toFixed(2) + "M";
    return "$" + n.toLocaleString();
  };

  function render(list) {
    const grid = document.getElementById("grid");
    if (!list.length) { grid.innerHTML = '<p style="color:var(--muted)">No matches.</p>'; return; }
    grid.innerHTML = list.map((c) => {
      const ch = c.price_change_percentage_24h ?? 0;
      const up = ch >= 0;
      return `
        <div class="card">
          <div class="coin-head">
            <img src="${c.image}" alt="${c.name}" loading="lazy" />
            <div>
              <div class="coin-name">${c.name}</div>
              <div class="coin-sym">${c.symbol}</div>
            </div>
          </div>
          <div class="price">${fmt(c.current_price)}</div>
          <div class="change ${up ? "up" : "down"}">${up ? "▲" : "▼"} ${Math.abs(ch).toFixed(2)}%</div>
          <div class="meta"><span>Rank #${c.market_cap_rank}</span><span>${fmtCap(c.market_cap)}</span></div>
        </div>`;
    }).join("");
  }

  async function load() {
    try {
      const res = await fetch(API);
      if (!res.ok) throw new Error(res.status);
      coins = await res.json();
      filterAndRender();
    } catch (e) {
      document.getElementById("grid").innerHTML =
        '<p style="color:var(--muted)">Couldn\'t load market data (rate limit). Retrying soon…</p>';
    }
  }

  function filterAndRender() {
    const q = document.getElementById("search").value.toLowerCase().trim();
    render(q ? coins.filter((c) => c.name.toLowerCase().includes(q) || c.symbol.toLowerCase().includes(q)) : coins);
  }

  document.getElementById("search").addEventListener("input", filterAndRender);
  load();
  setInterval(load, 60000);
</script>
</body>
</html>
