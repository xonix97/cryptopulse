<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CryptoPulse — Live Market Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:#06070d; --panel:#0d0f1a; --line:rgba(255,255,255,.07);
    --text:#e6e8f0; --muted:#7a8095; --green:#00e0a4; --red:#ff5470; --amber:#ffb547;
    --mono:"JetBrains Mono",monospace;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:"Inter",system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  /* ticker */
  .ticker { border-bottom:1px solid var(--line); background:var(--panel); overflow:hidden; white-space:nowrap; }
  .ticker-track { display:inline-block; padding:10px 0; animation:scroll 40s linear infinite; }
  .ticker:hover .ticker-track { animation-play-state:paused; }
  @keyframes scroll { from{transform:translateX(0);} to{transform:translateX(-50%);} }
  .tk { display:inline-flex; gap:8px; align-items:center; margin:0 22px; font-family:var(--mono); font-size:13px; }
  .tk .sym { color:var(--muted); text-transform:uppercase; }

  .shell { max-width:1200px; margin:0 auto; padding:24px 20px 60px; }
  .top { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:14px; margin-bottom:24px; }
  .brand { display:flex; align-items:center; gap:12px; font-weight:800; font-size:22px; letter-spacing:-.5px; }
  .logo { width:34px; height:34px; border-radius:9px; background:linear-gradient(135deg,var(--green),#0091ff); display:grid; place-items:center; box-shadow:0 0 20px rgba(0,224,164,.45); font-size:18px; }
  .live { font-family:var(--mono); font-size:12px; color:var(--muted); display:flex; align-items:center; gap:7px; }
  .dot { width:7px; height:7px; border-radius:50%; background:var(--green); box-shadow:0 0 10px var(--green); animation:blink 1.5s infinite; }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.3;} }

  /* featured chart */
  .featured { background:var(--panel); border:1px solid var(--line); border-radius:18px; padding:22px; margin-bottom:24px; }
  .feat-head { display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  .feat-head img { width:44px; height:44px; border-radius:50%; }
  .feat-name { font-size:20px; font-weight:700; }
  .feat-sym { color:var(--muted); font-size:13px; text-transform:uppercase; font-family:var(--mono); }
  .feat-price { font-size:34px; font-weight:800; letter-spacing:-1px; margin-left:auto; font-family:var(--mono); }
  .feat-ch { font-family:var(--mono); font-weight:700; padding:5px 12px; border-radius:999px; font-size:14px; }
  .up { color:var(--green); background:rgba(0,224,164,.12); }
  .down { color:var(--red); background:rgba(255,84,112,.12); }
  .chart-wrap { margin-top:18px; position:relative; }
  svg.area { width:100%; height:220px; display:block; }
  .hint { font-family:var(--mono); font-size:11px; color:var(--muted); margin-top:8px; }

  .controls { display:flex; gap:10px; margin-bottom:16px; }
  input { flex:1; padding:12px 16px; border-radius:12px; border:1px solid var(--line); background:var(--panel); color:var(--text); font-size:15px; outline:none; font-family:var(--mono); }
  input:focus { border-color:var(--green); }

  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:14px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:16px; cursor:pointer; transition:transform .18s, border-color .18s; }
  .card:hover { transform:translateY(-4px); border-color:rgba(0,224,164,.5); }
  .card.active { border-color:var(--green); box-shadow:0 0 0 1px var(--green); }
  .c-head { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .c-head img { width:28px; height:28px; border-radius:50%; }
  .c-name { font-weight:700; font-size:14px; }
  .c-sym { color:var(--muted); font-size:11px; text-transform:uppercase; font-family:var(--mono); }
  .c-price { font-family:var(--mono); font-size:18px; font-weight:700; }
  .c-row { display:flex; align-items:center; justify-content:space-between; margin-top:6px; }
  .c-ch { font-family:var(--mono); font-size:12px; font-weight:700; }
  svg.spark { width:80px; height:34px; }
  .skeleton { height:120px; border-radius:16px; background:linear-gradient(90deg,rgba(255,255,255,.03),rgba(255,255,255,.08),rgba(255,255,255,.03)); background-size:200% 100%; animation:shimmer 1.4s infinite; }
  @keyframes shimmer { 0%{background-position:200% 0;} 100%{background-position:-200% 0;} }
  footer { margin-top:36px; text-align:center; color:var(--muted); font-size:13px; font-family:var(--mono); }
  footer a { color:var(--green); text-decoration:none; }
</style>
</head>
<body>
  <div class="ticker"><div class="ticker-track" id="ticker"></div></div>

  <div class="shell">
    <div class="top">
      <div class="brand"><div class="logo">⬡</div> CryptoPulse</div>
      <div class="live"><span class="dot"></span> LIVE · 7-DAY CHARTS · REFRESH 60s</div>
    </div>

    <div class="featured" id="featured">
      <div class="skeleton" style="height:260px"></div>
    </div>

    <div class="controls">
      <input id="search" placeholder="$ filter market… (btc, eth, sol)" />
    </div>

    <div class="grid" id="grid">
      <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
      <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
    </div>

    <footer>
      data: <a href="https://www.coingecko.com" target="_blank" rel="noopener">coingecko</a> ·
      built by <a href="https://xonix-am14.netlify.app" target="_blank" rel="noopener">xonix</a> ·
      <a href="https://laborx.com/gigs/i-will-build-a-custom-discord-bot-for-your-server-in-48-hours-103949" target="_blank" rel="noopener">hire me</a>
    </footer>
  </div>

<script>
  const API = "https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=30&page=1&sparkline=true&price_change_percentage=24h";
  let coins = [], featuredId = null;

  const fmt = (n) => n >= 1 ? "$" + n.toLocaleString("en-US",{maximumFractionDigits:2}) : "$" + n.toLocaleString("en-US",{maximumFractionDigits:6});
  const cap = (n) => n>=1e12?"$"+(n/1e12).toFixed(2)+"T":n>=1e9?"$"+(n/1e9).toFixed(2)+"B":n>=1e6?"$"+(n/1e6).toFixed(2)+"M":"$"+n.toLocaleString();

  // build an SVG path from a price array
  function pathFor(prices, w, h, pad=2) {
    if (!prices || prices.length < 2) return "";
    const min = Math.min(...prices), max = Math.max(...prices), range = (max-min)||1;
    const step = (w - pad*2) / (prices.length - 1);
    return prices.map((p,i) => {
      const x = pad + i*step;
      const y = pad + (h - pad*2) * (1 - (p-min)/range);
      return (i?"L":"M") + x.toFixed(1) + " " + y.toFixed(1);
    }).join(" ");
  }
  function spark(prices, up) {
    const w=80,h=34, d=pathFor(prices,w,h);
    const color = up?"var(--green)":"var(--red)";
    return `<svg class="spark" viewBox="0 0 ${w} ${h}"><path d="${d}" fill="none" stroke="${color}" stroke-width="1.6"/></svg>`;
  }
  function areaChart(prices, up) {
    const w=900,h=220, d=pathFor(prices,w,h);
    const color = up?"#00e0a4":"#ff5470";
    const fillD = d + ` L ${w-2} ${h} L 2 ${h} Z`;
    return `<svg class="area" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
      <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity="0.35"/>
        <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
      </linearGradient></defs>
      <path d="${fillD}" fill="url(#g)"/>
      <path d="${d}" fill="none" stroke="${color}" stroke-width="2"/>
    </svg>`;
  }

  function renderFeatured() {
    const c = coins.find(x => x.id === featuredId) || coins[0];
    if (!c) return;
    const prices = c.sparkline_in_7d?.price || [];
    const up = (c.price_change_percentage_24h ?? 0) >= 0;
    document.getElementById("featured").innerHTML = `
      <div class="feat-head">
        <img src="${c.image}" alt="${c.name}"/>
        <div><div class="feat-name">${c.name}</div><div class="feat-sym">${c.symbol} · rank #${c.market_cap_rank}</div></div>
        <div class="feat-price">${fmt(c.current_price)}</div>
        <div class="feat-ch ${up?"up":"down"}">${up?"▲":"▼"} ${Math.abs(c.price_change_percentage_24h ?? 0).toFixed(2)}% (24h)</div>
      </div>
      <div class="chart-wrap">${areaChart(prices, up)}</div>
      <div class="hint">7-day price · mcap ${cap(c.market_cap)} · vol ${cap(c.total_volume)} · click any coin below to chart it</div>`;
  }

  function renderGrid(list) {
    const grid = document.getElementById("grid");
    if (!list.length) { grid.innerHTML = '<p style="color:var(--muted);font-family:var(--mono)">no matches.</p>'; return; }
    grid.innerHTML = list.map(c => {
      const up = (c.price_change_percentage_24h ?? 0) >= 0;
      return `<div class="card ${c.id===featuredId?"active":""}" data-id="${c.id}">
        <div class="c-head"><img src="${c.image}" loading="lazy" alt=""/>
          <div><div class="c-name">${c.name}</div><div class="c-sym">${c.symbol}</div></div></div>
        <div class="c-price">${fmt(c.current_price)}</div>
        <div class="c-row">
          <span class="c-ch ${up?"up":"down"}" style="background:none;padding:0">${up?"+":""}${(c.price_change_percentage_24h ?? 0).toFixed(2)}%</span>
          ${spark(c.sparkline_in_7d?.price, up)}
        </div>
      </div>`;
    }).join("");
    grid.querySelectorAll(".card").forEach(el =>
      el.addEventListener("click", () => { featuredId = el.dataset.id; renderFeatured(); filterAndRender(); window.scrollTo({top:0,behavior:"smooth"}); }));
  }

  function renderTicker() {
    const items = coins.slice(0,15).map(c => {
      const up=(c.price_change_percentage_24h ?? 0)>=0;
      return `<span class="tk"><span class="sym">${c.symbol}</span> ${fmt(c.current_price)} <span style="color:${up?'var(--green)':'var(--red)'}">${up?"▲":"▼"}${Math.abs(c.price_change_percentage_24h ?? 0).toFixed(1)}%</span></span>`;
    }).join("");
    document.getElementById("ticker").innerHTML = items + items;
  }

  function filterAndRender() {
    const q = document.getElementById("search").value.toLowerCase().trim();
    renderGrid(q ? coins.filter(c => c.name.toLowerCase().includes(q) || c.symbol.toLowerCase().includes(q)) : coins);
  }

  async function load() {
    try {
      const res = await fetch(API);
      if (!res.ok) throw new Error(res.status);
      coins = await res.json();
      if (!featuredId) featuredId = coins[0]?.id;
      renderTicker(); renderFeatured(); filterAndRender();
    } catch (e) {
      document.getElementById("grid").innerHTML = '<p style="color:var(--muted);font-family:var(--mono)">rate-limited, retrying…</p>';
    }
  }

  document.getElementById("search").addEventListener("input", filterAndRender);
  load();
  setInterval(load, 60000);
</script>
</body>
</html>
